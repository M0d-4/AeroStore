# Easiest IPA path: no Makefile, no Nightly. Run manually → download one artifact.
name: Get IPA (unsigned)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: get-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ipa:
    # Match nightly/pr workflows: Xcode 26 + consistent SwiftPM layout (avoids bogus `/Package.swift` resolution on some runners).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Shallow default clones can leave submodule checkouts empty; full history is safest for gitlinks.
          fetch-depth: 0
          # libidevice_ffi.a is stored in Git LFS — without this flag the runner
          # gets a tiny pointer file instead of the actual library, causing link failure.
          lfs: true

      - name: Sync submodules and ensure native Dependencies checkouts
        run: bash scripts/ci/ensure_fluxstore_dependencies.sh

      - name: SwiftPM — GitHub token (fewer clone/rate-limit issues)
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: "26.4"

      - name: Find Xcode project
        id: proj
        run: |
          set -euo pipefail
          for d in . proj/FluxStore FluxStore; do
            if [[ -f "$d/AltStore.xcodeproj/project.pbxproj" ]]; then
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              echo "Project: $d/AltStore.xcodeproj"
              exit 0
            fi
          done
          echo "::error::AltStore.xcodeproj not found"; exit 1

      - name: Patch AltSign SPM manifest (SwiftPM / Xcode 26)
        run: python3 scripts/ci/patch_altsign_package_swift.py

      - name: Resolve packages
        run: |
          set -euo pipefail
          P="${{ steps.proj.outputs.dir }}"
          ROOT="${GITHUB_WORKSPACE:?}"
          PROJ="${ROOT%/}/${P#./}/AltStore.xcodeproj"
          DD="${ROOT}/build/ci-DerivedData"
          SP="${ROOT}/build/ci-SourcePackages"
          rm -rf "$DD" "$SP"
          mkdir -p "$DD" "$SP" "${ROOT}/build"
          xcodebuild -resolvePackageDependencies \
            -project "$PROJ" \
            -scheme SideStore \
            -derivedDataPath "$DD" \
            -clonedSourcePackagesDirPath "$SP"

      - name: Fetch em_proxy prebuilt binaries
        run: bash scripts/ci/fetch_em_proxy_prebuilt.sh

      - name: Validate Pre-Build
        run: python3 scripts/ci/workflow.py validate-pre-build

      - name: Archive (unsigned)
        run: |
          set -euo pipefail
          # Prepend Homebrew so all Xcode build-phase scripts (e.g. em_proxy fetch) can find wget.
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          P="${{ steps.proj.outputs.dir }}"
          ROOT="${GITHUB_WORKSPACE:?}"
          PROJ="${ROOT%/}/${P#./}/AltStore.xcodeproj"
          DD="${ROOT}/build/ci-DerivedData"
          SP="${ROOT}/build/ci-SourcePackages"
          mkdir -p "${ROOT}/build"
          LOG="${ROOT}/build/xcode-archive.log"
          set +e
          xcodebuild archive \
            -project "$PROJ" \
            -scheme SideStore \
            -configuration Debug \
            -archivePath "${ROOT}/build/App.xcarchive" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DD" \
            -clonedSourcePackagesDirPath "$SP" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            2>&1 | tee "$LOG"
          XC="${PIPESTATUS[0]}"
          set -e
          if [[ "$XC" -ne 0 ]]; then
            echo "::error::xcodebuild archive failed (exit $XC)"
            echo "---- Last 200 lines of xcode-archive.log ----"
            tail -n 200 "$LOG" || true
            echo "---- Linker / compiler errors ----"
            grep -iE 'undefined symbol|library not found|linker command failed| error: |fatal error:|following build commands failed|BUILD FAILED' "$LOG" | tail -150 || true
            exit "$XC"
          fi

      - name: Make IPA zip
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE:?}"
          APP="$(find "${ROOT}/build/App.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" -print -quit)"
          test -n "$APP" && test -d "$APP"
          rm -rf "${ROOT}/build/Payload" "${ROOT}/build/App.ipa"
          mkdir -p "${ROOT}/build/Payload"
          cp -R "$APP" "${ROOT}/build/Payload/"
          (cd "${ROOT}/build" && zip -qr App.ipa Payload)
          rm -rf "${ROOT}/build/Payload"
          ls -lh "${ROOT}/build/App.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: AeroStore-unsigned
          path: build/App.ipa
          compression-level: 0
          retention-days: 30

      - name: Create Release and upload (tagged pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE:?}"
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            --latest 2>/dev/null || true
          gh release upload "$TAG" \
            "${ROOT}/build/App.ipa" \
            --clobber
