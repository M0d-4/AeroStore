name: Get Simulator App

on:
  workflow_dispatch:
    inputs:
      simulator_name:
        description: "Simulator device name"
        required: true
        default: "iPhone 17 Pro"
      simulator_os:
        description: "Simulator OS version"
        required: true
        default: "26.0"
      launch_app:
        description: "Install and launch in simulator after building"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: get-simulator-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator-app:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Sync submodules and ensure native Dependencies checkouts
        run: bash scripts/ci/ensure_fluxstore_dependencies.sh

      - name: SwiftPM - GitHub token
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: "26.4"

      - name: Find Xcode project
        id: proj
        run: |
          set -euo pipefail
          for d in . proj/FluxStore FluxStore; do
            if [[ -f "$d/AltStore.xcodeproj/project.pbxproj" ]]; then
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              echo "Project: $d/AltStore.xcodeproj"
              exit 0
            fi
          done
          echo "::error::AltStore.xcodeproj not found"; exit 1

      - name: Patch AltSign SPM manifest
        run: python3 scripts/ci/patch_altsign_package_swift.py

      - name: Resolve packages
        run: |
          set -euo pipefail
          P="${{ steps.proj.outputs.dir }}"
          ROOT="${GITHUB_WORKSPACE:?}"
          PROJ="${ROOT%/}/${P#./}/AltStore.xcodeproj"
          DD="${ROOT}/build/sim-DerivedData"
          SP="${ROOT}/build/sim-SourcePackages"
          rm -rf "$DD" "$SP"
          mkdir -p "$DD" "$SP" "${ROOT}/build"
          xcodebuild -resolvePackageDependencies \
            -project "$PROJ" \
            -scheme SideStore \
            -derivedDataPath "$DD" \
            -clonedSourcePackagesDirPath "$SP"

      - name: Fetch em_proxy prebuilt binaries
        run: bash scripts/ci/fetch_em_proxy_prebuilt.sh

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import subprocess
          import sys

          name = os.environ["SIMULATOR_NAME"]
          version = os.environ["SIMULATOR_OS"]
          runtime_suffix = "iOS-" + version.replace(".", "-")
          devices = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "--json"]))

          matches = []
          for runtime, runtime_devices in devices.get("devices", {}).items():
              if not runtime.endswith(runtime_suffix):
                  continue
              matches.extend(device for device in runtime_devices if device.get("name") == name and device.get("isAvailable"))

          if not matches:
              print(f"::error::No available simulator named {name!r} for iOS {version}.", file=sys.stderr)
              print("Available devices:", file=sys.stderr)
              for runtime, runtime_devices in devices.get("devices", {}).items():
                  if ".iOS-" not in runtime:
                      continue
                  for device in runtime_devices:
                      if device.get("isAvailable"):
                          print(f"  {runtime}: {device.get('name')} ({device.get('udid')})", file=sys.stderr)
              sys.exit(1)

          print(f"udid={matches[0]['udid']}")
          PY
        env:
          SIMULATOR_NAME: ${{ inputs.simulator_name }}
          SIMULATOR_OS: ${{ inputs.simulator_os }}

      - name: Build simulator app
        run: |
          set -euo pipefail
          P="${{ steps.proj.outputs.dir }}"
          ROOT="${GITHUB_WORKSPACE:?}"
          PROJ="${ROOT%/}/${P#./}/AltStore.xcodeproj"
          DD="${ROOT}/build/sim-DerivedData"
          SP="${ROOT}/build/sim-SourcePackages"
          DEST="platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}"
          LOG="${ROOT}/build/xcode-simulator-build.log"
          mkdir -p "${ROOT}/build"
          set +e
          xcodebuild build \
            -project "$PROJ" \
            -scheme SideStore \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "$DEST" \
            -derivedDataPath "$DD" \
            -clonedSourcePackagesDirPath "$SP" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            2>&1 | tee "$LOG"
          XC="${PIPESTATUS[0]}"
          set -e
          if [[ "$XC" -ne 0 ]]; then
            echo "::error::xcodebuild simulator build failed (exit $XC). First compiler/driver errors:"
            grep -E " error: |fatal error:" "$LOG" | head -120 || true
            exit "$XC"
          fi

      - name: Package simulator app
        id: package
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE:?}"
          APP="$(find "${ROOT}/build/sim-DerivedData/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name "*.app" -print -quit)"
          test -n "$APP" && test -d "$APP"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print CFBundleIdentifier' "$APP/Info.plist")
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"
          ditto -c -k --keepParent "$APP" "${ROOT}/build/FluxStore-simulator.app.zip"
          ls -lh "${ROOT}/build/FluxStore-simulator.app.zip"

      - name: Install and launch simulator app
        if: ${{ inputs.launch_app == 'true' }}
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE:?}"
          APP="${{ steps.package.outputs.app }}"
          BUNDLE_ID="${{ steps.package.outputs.bundle_id }}"
          SIMULATOR_UDID="${{ steps.sim.outputs.udid }}"
          mkdir -p "${ROOT}/build/sim-logs"
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          xcrun simctl install "$SIMULATOR_UDID" "$APP"
          set +e
          xcrun simctl launch --console "$SIMULATOR_UDID" "$BUNDLE_ID" 2>&1 | tee "${ROOT}/build/sim-logs/launch.log"
          STATUS="${PIPESTATUS[0]}"
          set -e
          xcrun simctl spawn "$SIMULATOR_UDID" log show --last 2m --predicate 'process == "FluxStore"' > "${ROOT}/build/sim-logs/device.log" || true
          exit "$STATUS"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: simulator-build
          path: |
            build/FluxStore-simulator.app.zip
            build/xcode-simulator-build.log
            build/sim-logs
          retention-days: 30
